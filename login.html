<!--
  ============================================================
   B.Tech Assignment - Secure User Authentication System
   Frontend: AngularJS
   File: login.html  (Login Page Template)
  ============================================================
   This is the AngularJS partial template for the login page.
   It uses:
     ng-model    → two-way binding to $scope.credentials
     ng-submit   → calls $scope.login() on form submit
     ng-show     → shows error/success messages conditionally
     ng-disabled → disables button while loading
  ============================================================
-->

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- ── Card Header ──────────────────────────────────── -->
    <div class="auth-header">
      <div class="lock-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h2>Secure Login</h2>
      <p class="auth-subtitle">Enter your credentials to continue</p>
    </div>

    <!-- ── Login Form ────────────────────────────────────── -->
    <!-- ng-submit prevents default form behaviour and calls login() -->
    <form ng-submit="login()" class="auth-form" novalidate>

<!-- Username Field -->
<div class="form-group">
  <label for="username">Username</label>
  <div class="input-wrap">
    <span class="input-icon">👤</span>
          <!-- ng-model binds input value to $scope.credentials.username -->
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="Enter username"
            ng-model="credentials.username"
            autocomplete="off"
            required
          />
        </div>
      </div>

    <!-- Password Field -->
<div class="form-group">
  <label for="password">Password</label>
  <div class="input-wrap">
    <span class="input-icon">🔒</span>
    <input
      type="password"
      id="password"
      class="form-input"
      placeholder="Enter password"
      ng-model="credentials.password"
      required
    />
  </div>
</div>

      <!-- ── Error Message (shown only when errorMessage is set) -->
      <div class="alert alert-error" ng-show="errorMessage">
        <span class="alert-icon">✕</span>
        {{ errorMessage }}
      </div>

      <!-- ── Success Message (shown only when successMessage is set) -->
      <div class="alert alert-success" ng-show="successMessage">
        <span class="alert-icon">✓</span>
        {{ successMessage }}
      </div>

      <!-- ── Submit Button ─────────────────────────────────── -->
      <!-- ng-disabled prevents double-clicks while loading -->
      <button
        type="submit"
        class="btn-primary"
        ng-disabled="isLoading"
      >
        <span ng-show="!isLoading">Login &nbsp;→</span>
        <span ng-show="isLoading" class="loading-text">
          <span class="spinner"></span> Authenticating...
        </span>
      </button>

    </form>

    <!-- ── Hint for Assignment Demo ──────────────────────────── -->
    <div class="demo-hint">
      <strong>Demo Credentials:</strong>&nbsp; admin / 1234
    </div>

  </div>
</div>
